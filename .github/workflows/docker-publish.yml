name: docker-publish

# Publishes the eiretes image to Docker Hub.
#
# Triggers:
#   - push of git tag v*.*.*  → tags: :latest, :X.Y.Z, :X.Y
#   - manual workflow_dispatch (for re-publishing the current ref)
#
# Tag a release with:
#     git tag v0.1.0 && git push origin v0.1.0
#
# Required secrets:
#   DOCKERHUB_USERNAME — Docker Hub account
#   DOCKERHUB_TOKEN    — Docker Hub access token (read/write/delete scope)
#
# Required variable (Settings → Variables → Actions):
#   DOCKERHUB_NAMESPACE — Docker Hub user/org to push under

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

concurrency:
  group: docker-publish-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Derive image tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ vars.DOCKERHUB_NAMESPACE }}/eiretes
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/v') }}
            type=raw,value=manual-{{sha}},enable=${{ github.event_name == 'workflow_dispatch' }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64
